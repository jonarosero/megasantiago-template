<!DOCTYPE html>
<html lang="es" style="--ms-red:#00293E;--ms-yellow:#FFC72C;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Santiago — Offline HTML</title>
<style>
/* Mega Santiago — marketplace styles */
:root {
  --ms-red: #00293E; /* primary blue */
  --ms-red-dark: #001F2F;
  --ms-red-soft: #E6EEF2;
  --ms-blue: #0D4169;         /* secondary blue */
  --ms-blue-dark: #082F4D;
  --ms-yellow: #FFC72C;
  --ms-yellow-soft: #FFF7E0;
  --ms-navy: #00293E;
  --ms-ink: #00293E;
  --ms-text: #2A2D44;
  --ms-muted: #6B6E84;
  --ms-line: #E7E8EE;
  --ms-bg: #FBFAF7;
  --ms-card: #FFFFFF;
  --ms-success: #2D7A4F;
  --shadow-sm: 0 1px 2px rgba(20,23,42,.06), 0 1px 1px rgba(20,23,42,.04);
  --shadow-md: 0 4px 12px rgba(20,23,42,.06), 0 2px 4px rgba(20,23,42,.04);
  --shadow-lg: 0 16px 40px rgba(20,23,42,.12), 0 4px 12px rgba(20,23,42,.06);
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--ms-bg);
  color: var(--ms-text);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }

.container { max-width: 1320px; margin: 0 auto; padding: 0 20px; }

/* ============= TOP STRIP ============= */
.top-strip {
  background: var(--ms-navy);
  color: #fff;
  font-size: 12.5px;
  letter-spacing: .02em;
}
.top-strip .container {
  display: flex; justify-content: space-between; align-items: center;
  height: 36px; gap: 20px;
}
.top-strip .left { display: flex; align-items: center; gap: 18px; opacity: .9; }
.top-strip .right { display: flex; align-items: center; gap: 18px; opacity: .9; }
.top-strip .right span { display: inline-flex; align-items: center; gap: 6px; }
@media (max-width: 720px){ .top-strip .right { display: none; } .top-strip .left span:nth-child(2){display:none;} }

/* ============= HEADER ============= */
.header { background: #fff; border-bottom: 1px solid var(--ms-line); position: sticky; top: 0; z-index: 50; }
.header-inner { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 24px; height: 78px; }

.logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.logo.logo-img img { display: block; height: 48px; width: auto; max-width: 220px; object-fit: contain; }
@media (max-width: 720px){ .logo.logo-img img { height: 38px; } }
.logo-mark {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--ms-red);
  display: grid; place-items: center;
  position: relative;
  overflow: hidden;
  padding: 4px;
  box-shadow: 0 6px 12px rgba(225,29,46,.25);
}
.logo-mark svg { width: 100%; height: 100%; display: block; }
.logo-text { line-height: 1; }
.logo-text .top { font-family: 'Archivo Black', 'Archivo', sans-serif; font-size: 22px; color: var(--ms-navy); letter-spacing: -.02em; }
.logo-text .sub { font-size: 10.5px; color: var(--ms-muted); margin-top: 2px; letter-spacing: .12em; text-transform: uppercase; font-weight: 600; }

.search-bar {
  display: flex; align-items: center;
  background: #F4F4F0;
  border: 1.5px solid transparent;
  border-radius: 999px;
  padding: 4px 4px 4px 18px;
  transition: all .2s;
  max-width: 640px;
  margin: 0 auto;
  width: 100%;
}
.search-bar:focus-within { background: #fff; border-color: var(--ms-navy); box-shadow: 0 0 0 4px rgba(27,31,59,.06); }
.search-bar input { flex: 1; border: 0; background: transparent; outline: none; font-size: 14.5px; padding: 10px 12px; color: var(--ms-ink); }
.search-bar input::placeholder { color: var(--ms-muted); }
.search-cat {
  border-right: 1px solid var(--ms-line); padding-right: 14px; margin-right: 6px;
  font-size: 13px; color: var(--ms-muted); display: flex; align-items: center; gap: 4px;
}
.search-btn {
  background: var(--ms-red); color: #fff;
  width: 44px; height: 44px; border-radius: 999px;
  display: grid; place-items: center;
  transition: background .15s;
}
.search-btn:hover { background: var(--ms-red-dark); }

.header-actions { display: flex; align-items: center; gap: 4px; }
.header-actions .icon-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 10px; color: var(--ms-ink);
  font-size: 13px; transition: background .15s; position: relative;
}
.header-actions .icon-btn:hover { background: #F4F4F0; }
.icon-btn .label { font-weight: 600; }
.icon-btn .small { display: block; font-size: 10.5px; color: var(--ms-muted); font-weight: 500; }
.cart-btn { background: var(--ms-yellow) !important; color: var(--ms-navy) !important; padding: 10px 16px !important; border-radius: 999px !important; }
.cart-btn:hover { background: #ffb700 !important; }
.cart-badge {
  position: absolute; top: 2px; right: 2px;
  background: var(--ms-red); color: #fff;
  font-size: 10.5px; font-weight: 700;
  min-width: 18px; height: 18px; border-radius: 999px;
  display: grid; place-items: center; padding: 0 5px;
  border: 2px solid var(--ms-yellow);
}

.menu-btn-mobile { display: none; }
@media (max-width: 1024px){
  .header-inner { grid-template-columns: auto 1fr auto; height: 64px; gap: 12px; }
  .search-bar { display: none; }
  .header-actions .icon-btn .label, .header-actions .icon-btn .small { display: none; }
  .cart-btn .label { display: none !important; }
  .menu-btn-mobile { display: grid; place-items: center; width: 40px; height: 40px; border-radius: 10px; }
  .menu-btn-mobile:hover { background: #F4F4F0; }
}

/* ============= NAV ============= */
.nav-row { background: #fff; border-bottom: 1px solid var(--ms-line); }
.nav-inner { display: flex; align-items: center; height: 48px; gap: 4px; overflow-x: auto; scrollbar-width: none; }
.nav-inner::-webkit-scrollbar { display: none; }
.nav-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 8px;
  font-size: 13.5px; font-weight: 500; color: var(--ms-text);
  white-space: nowrap; transition: all .15s;
}
.nav-pill:hover { background: #F4F4F0; color: var(--ms-red); }
.nav-pill.active { background: var(--ms-red-soft); color: var(--ms-red); font-weight: 600; }
.nav-pill .dot { width: 6px; height: 6px; border-radius: 999px; }

.mobile-search { display: none; padding: 12px 20px; background: #fff; border-bottom: 1px solid var(--ms-line); }
@media (max-width: 1024px){
  .mobile-search { display: block; }
  .mobile-search .search-bar { display: flex; max-width: none; }
  .mobile-search .search-cat { display: none; }
}

/* ============= HERO ============= */
.hero { padding: 24px 0 8px; }
.hero-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
@media (max-width: 900px){ .hero-grid { grid-template-columns: 1fr; } }

.hero-main {
  position: relative; border-radius: var(--radius-xl); overflow: hidden;
  background: linear-gradient(135deg, #FFF7E0 0%, #FFE3A6 100%);
  min-height: 380px; padding: 48px;
  display: flex; flex-direction: column; justify-content: center;
}
.hero-main.red    { background: linear-gradient(135deg, #E5EDF2 0%, #A8C4D6 100%); }
.hero-main.navy   { background: linear-gradient(135deg, #D6DEE6 0%, #7E94A8 100%); }
.hero-main.blue   { background: linear-gradient(135deg, #E5EDF2 0%, #6E96B5 100%); }

.hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 700; color: var(--ms-navy); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 16px; }
.hero-eyebrow .dot { width: 8px; height: 8px; background: var(--ms-red); border-radius: 999px; box-shadow: 0 0 0 4px rgba(225,29,46,.18); animation: pulse 1.6s infinite; }
@keyframes pulse { 50% { box-shadow: 0 0 0 8px rgba(225,29,46,0); } }

.hero-title {
  font-family: 'Archivo', 'Inter', sans-serif; font-weight: 900;
  font-size: clamp(32px, 5vw, 56px); line-height: 1.02;
  color: var(--ms-navy); letter-spacing: -.025em; margin: 0 0 16px;
  white-space: pre-line; text-wrap: balance;
}
.hero-sub { font-size: 16px; color: var(--ms-text); max-width: 480px; line-height: 1.5; margin-bottom: 28px; text-wrap: pretty; }

.btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 22px; border-radius: 999px; font-weight: 600; font-size: 14.5px; transition: all .15s; }
.btn-primary { background: var(--ms-red); color: #fff; }
.btn-primary:hover { background: var(--ms-red-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-dark { background: var(--ms-navy); color: #fff; }
.btn-dark:hover { background: #0e1129; }
.btn-ghost { background: rgba(255,255,255,.7); color: var(--ms-navy); border: 1px solid rgba(27,31,59,.1); }
.btn-ghost:hover { background: #fff; }

.hero-tag {
  position: absolute; top: 24px; right: 24px;
  background: var(--ms-navy); color: #fff;
  font-size: 11px; font-weight: 700; letter-spacing: .08em;
  padding: 8px 14px; border-radius: 999px;
}
.hero-art { position: absolute; right: -40px; bottom: -40px; opacity: .9; pointer-events: none; }

.hero-dots { position: absolute; bottom: 24px; left: 48px; display: flex; gap: 8px; }
.hero-dots button { width: 28px; height: 4px; border-radius: 999px; background: rgba(27,31,59,.2); }
.hero-dots button.active { background: var(--ms-navy); width: 36px; }

.hero-side { display: grid; gap: 16px; }
.hero-side .card {
  border-radius: var(--radius-lg); padding: 24px;
  display: flex; flex-direction: column; justify-content: space-between;
  min-height: 180px; position: relative; overflow: hidden;
  color: #fff;
}
.hero-side .card.red    { background: var(--ms-red); }
.hero-side .card.navy   { background: var(--ms-blue); }
.hero-side .card.blue   { background: var(--ms-blue); }
.hero-side .card.yellow { background: var(--ms-yellow); color: var(--ms-navy); }
.hero-side .card h3 { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 22px; line-height: 1.1; margin: 0; letter-spacing: -.02em; }
.hero-side .card p { font-size: 13.5px; opacity: .9; margin: 6px 0 0; }
.hero-side .card .cta { font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; margin-top: 12px; }
.hero-side .card .deco { position: absolute; right: -10px; bottom: -10px; opacity: .25; }

@media (max-width: 900px){
  .hero-side { grid-template-columns: 1fr 1fr; }
  .hero-main { padding: 32px 24px; min-height: 320px; }
}
@media (max-width: 540px){
  .hero-side { grid-template-columns: 1fr; }
}

/* ============= TRUST BAR ============= */
.trust-bar {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 16px; margin: 24px 0;
  background: #fff; border: 1px solid var(--ms-line); border-radius: var(--radius-lg);
  padding: 8px;
}
.trust-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: var(--radius); }
.trust-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--ms-yellow-soft); color: var(--ms-red); display: grid; place-items: center; flex: 0 0 40px; }
.trust-text strong { display: block; font-size: 13.5px; color: var(--ms-ink); font-weight: 700; }
.trust-text span { font-size: 12px; color: var(--ms-muted); }
@media (max-width: 800px){ .trust-bar { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 460px){ .trust-bar { grid-template-columns: 1fr; } }

/* ============= SECTION ============= */
.section { padding: 32px 0; }
.section-head { display: flex; justify-content: space-between; align-items: end; margin-bottom: 20px; gap: 16px; flex-wrap: wrap;}
.section-head h2 {
  font-family: 'Archivo', sans-serif; font-weight: 800;
  font-size: clamp(22px, 3vw, 28px); margin: 0;
  color: var(--ms-ink); letter-spacing: -.02em;
}
.section-head .eyebrow { font-size: 12px; font-weight: 700; color: var(--ms-red); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 6px; }
.section-link { font-size: 13.5px; font-weight: 600; color: var(--ms-navy); display: inline-flex; align-items: center; gap: 4px; }
.section-link:hover { color: var(--ms-red); }

/* ============= CATEGORIES ============= */
.cat-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
@media (max-width: 1024px){ .cat-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 540px){ .cat-grid { grid-template-columns: repeat(2, 1fr); } }

.cat-card {
  background: #fff; border: 1px solid var(--ms-line); border-radius: var(--radius-lg);
  padding: 22px 16px; text-align: center;
  transition: all .2s; cursor: pointer;
}
.cat-card:hover { transform: translateY(-3px); border-color: var(--ms-red); box-shadow: var(--shadow-md); }
.cat-card.active { border-color: var(--ms-red); background: var(--ms-red-soft); }
.cat-icon {
  width: 54px; height: 54px; margin: 0 auto 12px;
  display: grid; place-items: center;
  background: var(--ms-yellow-soft); border-radius: 16px;
  color: var(--ms-red);
}
.cat-card h4 { margin: 0; font-size: 13.5px; font-weight: 700; color: var(--ms-ink); }
.cat-card .count { font-size: 11.5px; color: var(--ms-muted); margin-top: 4px; }

/* ============= PRODUCT GRID ============= */
.toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;}
.toolbar .chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px solid var(--ms-line); background: #fff; border-radius: 999px; font-size: 13px; color: var(--ms-text); transition: all .15s; }
.chip:hover { border-color: var(--ms-navy); }
.chip.active { background: var(--ms-navy); color: #fff; border-color: var(--ms-navy); }
.toolbar .right { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--ms-muted); }
.select { background: #fff; border: 1px solid var(--ms-line); border-radius: 999px; padding: 8px 14px; font-size: 13px; font-family: inherit; color: var(--ms-ink); cursor: pointer; }

.products { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
@media (max-width: 1200px){ .products { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 900px){ .products { grid-template-columns: repeat(3, 1fr); gap: 12px;} }
@media (max-width: 640px){ .products { grid-template-columns: repeat(2, 1fr); gap: 12px;} }

.product {
  background: #fff; border: 1px solid var(--ms-line); border-radius: var(--radius-lg);
  overflow: hidden; transition: all .2s; position: relative; display: flex; flex-direction: column;
}
.product:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: transparent; }
.product-img-wrap {
  aspect-ratio: 1 / 1; background: #F6F5F0; position: relative; overflow: hidden;
  display: grid; place-items: center;
}
.product-img-wrap .placeholder {
  width: 75%; height: 75%; border-radius: var(--radius);
  background-image:
    linear-gradient(135deg, transparent 46%, rgba(0,0,0,.04) 46%, rgba(0,0,0,.04) 54%, transparent 54%);
  background-size: 12px 12px;
  display: grid; place-items: center;
  color: rgba(255,255,255,.85);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
  text-align: center; padding: 12px; line-height: 1.4;
  position: relative;
}
.product-img-wrap .placeholder span { background: rgba(0,0,0,.45); padding: 4px 8px; border-radius: 4px; backdrop-filter: blur(2px); }

.badge { position: absolute; top: 10px; left: 10px; background: var(--ms-red); color: #fff; font-size: 10.5px; font-weight: 700; padding: 4px 8px; border-radius: 6px; letter-spacing: .04em; z-index: 1; }
.badge.yellow { background: var(--ms-yellow); color: var(--ms-navy); }

.fav-btn { position: absolute; top: 10px; right: 10px; width: 34px; height: 34px; background: rgba(255,255,255,.95); border-radius: 999px; display: grid; place-items: center; color: var(--ms-muted); transition: all .15s; z-index: 1; box-shadow: var(--shadow-sm); }
.fav-btn:hover { color: var(--ms-red); transform: scale(1.08); }
.fav-btn.on { color: var(--ms-red); }

.quick-add {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--ms-navy); color: #fff;
  padding: 10px; font-size: 13px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transform: translateY(100%); transition: transform .2s;
}
.product:hover .quick-add { transform: translateY(0); }
@media (hover: none){ .quick-add { display: none; } }

.product-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
.product-brand { font-size: 11px; color: var(--ms-muted); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
.product-name { font-size: 13.5px; font-weight: 600; color: var(--ms-ink); line-height: 1.35; margin: 0; min-height: 36px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.product-rating { display: flex; align-items: center; gap: 4px; font-size: 11.5px; color: var(--ms-muted); }
.product-rating .stars { display: inline-flex; gap: 1px; }
.product-price { display: flex; align-items: baseline; gap: 8px; margin-top: auto; padding-top: 6px;}
.product-price .now { font-size: 18px; font-weight: 800; color: var(--ms-ink); font-family: 'Archivo', sans-serif; }
.product-price .old { font-size: 12.5px; color: var(--ms-muted); text-decoration: line-through; }
.product-price .iva { font-size: 10.5px; color: var(--ms-muted); margin-left: auto; }

.swatches { display: flex; gap: 4px; }
.swatches span { width: 12px; height: 12px; border-radius: 999px; border: 1.5px solid #fff; box-shadow: 0 0 0 1px var(--ms-line); }

/* mobile add */
.product-mobile-add { display: none; }
@media (hover: none) {
  .product-mobile-add {
    display: grid; place-items: center;
    width: 36px; height: 36px; border-radius: 999px;
    background: var(--ms-yellow); color: var(--ms-navy);
    margin-left: auto;
  }
}

/* ============= PROMO STRIP ============= */
.promo-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
@media (max-width: 800px){ .promo-strip { grid-template-columns: 1fr; } }
.promo {
  border-radius: var(--radius-lg); padding: 24px;
  color: #fff; position: relative; overflow: hidden;
  display: flex; align-items: center; gap: 16px;
}
.promo .promo-icon { width: 56px; height: 56px; background: rgba(255,255,255,.18); border-radius: 14px; display: grid; place-items: center; flex: 0 0 56px;}
.promo h4 { margin: 0; font-family: 'Archivo', sans-serif; font-size: 18px; font-weight: 800; }
.promo p { margin: 2px 0 0; font-size: 13px; opacity: .92; }
.promo.yellow { color: var(--ms-navy); }
.promo.yellow .promo-icon { background: rgba(27,31,59,.1); color: var(--ms-navy); }

/* ============= REVIEWS ============= */
.reviews { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
@media (max-width: 800px){ .reviews { grid-template-columns: 1fr; } }
.review {
  background: #fff; border: 1px solid var(--ms-line); border-radius: var(--radius-lg); padding: 24px;
}
.review .stars { display: flex; gap: 2px; margin-bottom: 10px; }
.review p { margin: 0 0 14px; font-size: 14px; line-height: 1.5; color: var(--ms-text); text-wrap: pretty;}
.review .who { display: flex; align-items: center; gap: 10px; }
.review .avatar { width: 36px; height: 36px; border-radius: 999px; background: var(--ms-navy); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: 13px;}
.review .name { font-size: 13px; font-weight: 600; color: var(--ms-ink); }
.review .city { font-size: 12px; color: var(--ms-muted); }

/* ============= FOOTER ============= */
.footer { background: var(--ms-navy); color: #fff; padding: 48px 0 24px; margin-top: 48px;}
.footer-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr 1.2fr; gap: 32px; }
@media (max-width: 900px){ .footer-grid { grid-template-columns: 1fr 1fr; gap: 24px;} }
@media (max-width: 540px){ .footer-grid { grid-template-columns: 1fr; gap: 24px;} }
.footer h5 { margin: 0 0 14px; font-size: 12.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--ms-yellow); font-weight: 700;}
.footer ul { list-style: none; padding: 0; margin: 0; }
.footer li { margin-bottom: 8px; }
.footer a { color: rgba(255,255,255,.78); font-size: 13.5px; }
.footer a:hover { color: #fff; }
.footer .about { font-size: 13.5px; line-height: 1.55; color: rgba(255,255,255,.78); }
.footer .pay { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
.footer .pay span { background: rgba(255,255,255,.08); border-radius: 6px; padding: 6px 10px; font-size: 11px; font-weight: 600; letter-spacing: .04em;}
.footer-bottom { border-top: 1px solid rgba(255,255,255,.1); margin-top: 32px; padding-top: 20px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; font-size: 12px; color: rgba(255,255,255,.55);}

/* ============= CART DRAWER ============= */
.drawer-backdrop {
  position: fixed; inset: 0; background: rgba(20,23,42,.42); backdrop-filter: blur(4px);
  z-index: 90; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.drawer-backdrop.open { opacity: 1; pointer-events: auto; }

    const sub = cartSubtotal();
    return `<div class="drawer-backdrop ${state.cartOpen?'open':''}" data-action="close-cart"></div>
      <aside class="drawer ${state.cartOpen?'open':''}" aria-hidden="${state.cartOpen?'false':'true'}"><div class="drawer-head"><h3>Tu carrito ${count>0?`<span style="color:var(--ms-red)">(${count})</span>`:''}</h3><button class="drawer-close" data-action="close-cart">${icon('close',18)}</button></div><div class="drawer-body">${state.cart.length===0 ? `<div class="drawer-empty"><div class="icon">${icon('cart',32)}</div><h4>Tu carrito está vacío</h4><p>Agrega productos y disfruta envío gratis sobre $25</p></div>` : `${sub < 25 ? `<div style="background:var(--ms-yellow-soft);padding:12px;border-radius:12px;font-size:12.5px;margin-bottom:8px;color:var(--ms-navy)"><strong>Te faltan ${formatPrice(25 - sub)}</strong> para envío GRATIS.<div style="margin-top:6px;height:6px;background:#fff;border-radius:999px;overflow:hidden"><div style="height:100%;width:${Math.min(100, (sub/25)*100)}%;background:var(--ms-red);transition:width .3s"></div></div></div>` : ''}${state.cart.map(line => `<div class="cart-line"><div class="thumb" style="background:${bgFor(line)};padding:6px;display:grid;place-items:center;overflow:hidden"><span style="width:100%;height:100%;display:block">${(window.MS_PRODUCT_IMAGES[line.img]||window.MS_PRODUCT_IMAGES.notebook)(line.color || '#0D4169', accentFor(line))}</span></div><div class="info"><h5>${escapeHtml(line.name)}</h5><div class="meta">${escapeHtml(line.brand)}</div><div class="price">${formatPrice(line.price * line.qty)}</div><span class="remove" data-action="remove-line" data-id="${line.id}">Eliminar</span></div><div class="qty" style="align-self:center"><button data-action="cart-qty" data-id="${line.id}" data-delta="-1">${icon('minus',14)}</button><span>${line.qty}</span><button data-action="cart-qty" data-id="${line.id}" data-delta="1">${icon('plus',14)}</button></div></div>`).join('')}`}</div>${state.cart.length > 0 ? `<div class="drawer-foot"><div class="totals"><div class="row"><span>Subtotal</span><span>${formatPrice(sub)}</span></div><div class="row"><span>IVA (15%)</span><span>${formatPrice(cartIva())}</span></div><div class="row"><span>Envío</span><span style="color:${sub>=25?'var(--ms-success)':'inherit'};font-weight:600">${sub>=25?'GRATIS':'$3.50'}</span></div><div class="row total"><span>Total</span><span>${formatPrice(cartGrandTotal())}</span></div></div><button class="checkout-btn">Finalizar compra ${icon('chevron',16,'#fff')}</button></div>`:''}</aside>`;
  }

  function mobileMenu(){
    return `<div class="drawer-backdrop ${state.menuOpen?'open':''}" data-action="close-menu"></div><aside class="mobile-menu ${state.menuOpen?'open':''}"><div class="mobile-menu-head"><div class="logo logo-img"><img src="${LOGO_URI}" alt="Santiago Papelería" style="max-height:36px"></div><button class="drawer-close" data-action="close-menu">${icon('close',18)}</button></div><div class="mobile-menu-list"><a data-action="set-cat" data-id="all"><span class="ic">${icon('sparkle',16)}</span> Todos los productos</a>${window.MS_DATA.categories.map(c => `<a data-action="set-cat" data-id="${c.id}"><span class="ic" style="background:${c.color}1A;color:${c.color}">${icon(c.icon,16)}</span> ${escapeHtml(c.name)}</a>`).join('')}<a data-action="open-account"><span class="ic">${icon('user',16)}</span> Mi cuenta</a><a><span class="ic">${icon('heart',16)}</span> Favoritos</a></div></aside>`;
  }

  function toast(){ return `<div class="toast ${state.toast ? 'show' : ''}" id="toast-slot"><span class="ic">${icon('cart',12)}</span> ${escapeHtml(state.toast || '')}</div>`; }
  function renderToastOnly(){
    const slot = document.getElementById('toast-slot');
    if (slot) slot.outerHTML = toast();
  }

  function header(){
    const count = cartCount();
    return `<header class="header"><div class="container header-inner"><button class="menu-btn-mobile" data-action="open-menu" aria-label="Menú">${icon('menu',22)}</button><div class="logo logo-img" data-action="go-home" role="button" aria-label="Inicio · Santiago Papelería"><img src="${LOGO_URI}" alt="Santiago Papelería"></div><div class="search-bar"><div class="search-cat">Todo ${icon('chevron',14)}</div><input id="searchDesktop" placeholder="Busca cuadernos, mochilas, marcadores…" value="${escapeHtml(state.searchQ)}"><button class="search-btn" aria-label="Buscar">${icon('search',18,'#fff')}</button></div><div class="header-actions"><button class="icon-btn" aria-label="Favoritos"><span>${icon('heart',20,'currentColor',state.favs.length?'currentColor':'none')}</span><div><span class="small">Mis</span><span class="label">Favoritos</span></div></button><button class="icon-btn" aria-label="Cuenta" data-action="open-account"><span>${icon('user',20)}</span><div><span class="small">Hola, María</span><span class="label">Mi cuenta</span></div></button><button class="icon-btn cart-btn" data-action="open-cart" aria-label="Carrito"><span>${icon('cart',22)}</span><span class="label">Carrito</span>${count>0?`<span class="cart-badge">${count}</span>`:''}</button></div></div><div class="container"><div class="nav-row"><div class="nav-inner"><button class="nav-pill ${state.activeCat==='all'?'active':''}" data-action="set-cat" data-id="all">${icon('sparkle',14)} Todos</button>${window.MS_DATA.categories.map(c => `<button class="nav-pill ${state.activeCat===c.id?'active':''}" data-action="set-cat" data-id="${c.id}"><span class="dot" style="background:${c.color}"></span> ${escapeHtml(c.name)}</button>`).join('')}<button class="nav-pill" style="margin-left:auto;color:var(--ms-red);font-weight:700">${icon('sparkle',14)} Promociones</button></div></div></div></header><div class="mobile-search"><div class="search-bar"><input id="searchMobile" placeholder="Buscar productos…" value="${escapeHtml(state.searchQ)}"><button class="search-btn">${icon('search',18,'#fff')}</button></div></div>`;
  }

  function pageHtml(){
    const page = currentPage();
    if (page === 'account') return accountPage();
    if (page === 'product') {
      const p = getProduct(state.activeProductId);
      return p ? productPage(p) : `<section class="section"><div class="empty-state"><h2>Producto no encontrado</h2><p>Ese producto no existe en esta demo offline.</p><button class="btn btn-primary" data-action="go-home">Volver al inicio</button></div></section>`;
    }
    return homePage();
  }

  function render(){
    app.innerHTML = `${header()}<main class="container">${pageHtml()}</main>${footer()}${cartDrawer()}${mobileMenu()}${toast()}`;
    persistState();
  }

  document.addEventListener('click', function(e){
    const target = e.target.closest('[data-action]');
    if (!target) return;
    const action = target.getAttribute('data-action');
    if (action === 'go-home') { goHome(); return; }
    if (action === 'open-account') { state.menuOpen = false; openAccount(); return; }
    if (action === 'open-product') { openProduct(target.getAttribute('data-id')); return; }
    if (action === 'toggle-fav') { toggleFav(target.getAttribute('data-id')); return; }
    if (action === 'add-cart') { addToCart(target.getAttribute('data-id'), target.getAttribute('data-qty') || 1); return; }
    if (action === 'cart-qty') { updateQty(target.getAttribute('data-id'), Number(target.getAttribute('data-delta'))); return; }
    if (action === 'remove-line') { removeLine(target.getAttribute('data-id')); return; }
    if (action === 'open-cart') { state.cartOpen = true; render(); return; }
    if (action === 'close-cart') { state.cartOpen = false; render(); return; }
    if (action === 'open-menu') { state.menuOpen = true; render(); return; }
    if (action === 'close-menu') { state.menuOpen = false; render(); return; }
    if (action === 'set-cat') { state.activeCat = target.getAttribute('data-id'); state.menuOpen = false; if (currentPage() !== 'home') goHome(); else render(); return; }
    if (action === 'set-cat-home') { state.activeCat = target.getAttribute('data-id'); goHome(); return; }
    if (action === 'hero-dot') { state.heroIdx = Number(target.getAttribute('data-index')); render(); return; }
    if (action === 'hero-cta' || action === 'scroll-products') { document.getElementById('products-section')?.scrollIntoView({behavior:'smooth',block:'start'}); return; }
    if (action === 'modal-qty') { state.modalQty = Math.max(1, Number(state.modalQty || 1) + Number(target.getAttribute('data-delta'))); render(); return; }
  });

  document.addEventListener('input', function(e){
    if (e.target && (e.target.id === 'searchDesktop' || e.target.id === 'searchMobile')) {
      state.searchQ = e.target.value || '';
      if (currentPage() !== 'home') goHome(); else render();
    }
  });
  document.addEventListener('change', function(e){
    if (e.target && e.target.id === 'sortSelect') {
      state.sort = e.target.value || 'relevance';
      render();
    }
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') {
      if (state.cartOpen || state.menuOpen) { state.cartOpen = false; state.menuOpen = false; render(); }
    }
  });

  setInterval(function(){
    state.heroIdx = (state.heroIdx + 1) % window.MS_DATA.hero.length;
    if (currentPage() === 'home') render();
    else persistState();
  }, 6000);

  if (!location.hash) location.hash = 'home';
  window.addEventListener('hashchange', syncRoute);
  syncRoute();
})();

</script>
</body>
</html>
